name: 08 - Deploy Website

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:

  deploy-website:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::889088857850:role/github-role-tier2
          aws-region: sa-east-1

      - name: Deploy Website using SSM
        run: |

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-07653cf973456d7cf" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Static Website" \
            --parameters 'commands=[
              "sudo apt-get update -y",
              "sudo apt-get install unzip -y",
              "cd /tmp/website",
              "sudo unzip -o website.zip -d /tmp/website/",
              "sudo rm -rf /var/www/html/*",
              "sudo cp -r /tmp/website/* /var/www/html/",
              "sudo chown -R www-data:www-data /var/www/html",
              "sudo chmod -R 755 /var/www/html",
              "ls -la /var/www/html"
            ]' \
            --region sa-east-1 \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID : $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-07653cf973456d7cf" \
            --region sa-east-1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-07653cf973456d7cf" \
            --region sa-east-1